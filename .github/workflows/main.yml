name: CI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v1
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1
      -
        name: Login to DockerHub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Build and push
        id: docker_build
        uses: docker/build-push-action@v2
        with:
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/legna-labs:${{ github.sha }}
      -
        name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}
      -
        name: Deploy Image
        run: |
          docker run --rm \
            caprover/cli-caprover:v2.1.1 \
            caprover deploy \
              --caproverUrl ${{ secrets.CAPROVER_URL }} \
              --caproverPassword "${{ secrets.CAPROVER_PASSWORD }}" \
              --caproverApp legna-labs \
              --imageName ${{ secrets.DOCKERHUB_USERNAME }}/legna-labs:${{ github.sha }}